# objetivo.yaml — Business Objective & Product Context
# Template Version: 1.0.0
# Created for: SpecKit Layer 1 (Business) workflow
# Last Updated: 2026-04-14
#
# Purpose: Capture business context, problem definition, value proposition,
#          and key decisions BEFORE technical specification starts.
#
# Workflow:
#   1. User creates objetivo.yaml (or speckit.clarify agent generates via interview)
#   2. Agent speckit.constitution analyzes objetivo.yaml → generates/updates constitution.md
#   3. Agent speckit.clarify identifies perguntas_abertas → interviews user → updates objetivo.yaml
#   4. Agent speckit.specify uses objetivo.yaml + context → generates spec.md (Layer 2)
#   5. Agent speckit.plan uses spec.md + decisoes_iniciais → generates plan.md + ADRs (Layer 3)
#   6. Agent speckit.tasks uses plan.md → generates tasks.md (Layer 4)

feature:
  id: "[FEATURE_ID]"
  name: "[FEATURE_NAME]"
  branch: "[BRANCH_NAME]"
  created: "[CREATION_DATE]"

negocio:
  problema:
    descricao: |
      [Descreva o problema de negócio que estamos resolvendo]

      Exemplo: "Equipes de DevOps gastam 2-3 horas configurando deploys manualmente,
      com alta taxa de erros (15%) devido a configurações inconsistentes."

    impacto_atual: |
      [O que acontece se não resolvermos este problema?]

      Exemplo: "Sem automação, tempo de deploy aumenta em 50%, custos operacionais
      sobem R$ 30k/mês, e downtime médio sobe de 2min para 30min."

    stakeholders:
      - "[STAKEHOLDER_1]"
      # Exemplo: "DevOps Engineers (usuários diretos)"
      - "[STAKEHOLDER_2]"
      # Exemplo: "SRE Team (administradores do sistema)"
      # Adicione mais stakeholders conforme necessário

  valor:
    objetivos_estrategicos:
      - "[STRATEGIC_OBJECTIVE_1]"
      # Exemplo: "Aumentar eficiência operacional em deploy em 80%"
      - "[STRATEGIC_OBJECTIVE_2]"
      # Exemplo: "Reduzir tempo médio de deploy de 2h para 15min"
      # Adicione mais objetivos conforme necessário

    metricas_sucesso:
      - metric: "[METRIC_NAME_1]"
        target: "[TARGET_VALUE_1]"
        # Exemplo:
        #   metric: "Taxa de adoção"
        #   target: "80% da equipe em 3 meses"

      - metric: "[METRIC_NAME_2]"
        target: "[TARGET_VALUE_2]"
        # Exemplo:
        #   metric: "Tempo médio de deploy"
        #   target: "<= 15 minutos (vs 2h atual)"

        # Adicione mais métricas conforme necessário

  contexto:
    restricoes_negocio:
      - "[CONSTRAINT_1]"
      # Exemplo: "Orçamento limitado: R$ 50 mil"
      - "[CONSTRAINT_2]"
      # Exemplo: "Deadline regulatório: 2026-12-31"
      # Adicione mais restrições conforme necessário

    premissas:
      - "[ASSUMPTION_1]"
      # Exemplo: "Usuários têm acesso à internet estável (>=10 Mbps)"
      - "[ASSUMPTION_2]"
      # Exemplo: "Integração com sistema legado X está disponível via API REST"
      # Adicione mais premissas conforme necessário

    bounded_contexts:
      # OPCIONAL: Para features complexas, identifique bounded contexts (DDD)
      # Se não aplicável, deixe como lista vazia: []
      - context: "[CONTEXT_NAME]"
        entities: [ "[ENTITY_1]", "[ENTITY_2]" ]
        # Exemplo:
        #   context: "Deploy Management"
        #   entities: ["Deployment", "Environment", "Rollback"]

produto:
  visao_alto_nivel: |
    [Em 1-2 frases, o que este produto/feature entrega?]

    Exemplo: "Sistema automatizado de deploy que permite equipes DevOps
    configurar e executar deploys via interface web/CLI, com rollback automático
    em caso de falha, reduzindo tempo de 2h para 15min e taxa de erro de 15% para <1%."

  personas:
    - name: "[PERSONA_NAME_1]"
      needs: "[USER_NEEDS_1]"
      pain_points: "[PAIN_POINTS_1]"
      # Exemplo:
      #   name: "DevOps Engineer"
      #   needs: "Automatizar deploys repetitivos sem configuração manual"
      #   pain_points: "Configuração manual é propensa a erros e consome 2-3h por deploy"

    - name: "[PERSONA_NAME_2]"
      needs: "[USER_NEEDS_2]"
      pain_points: "[PAIN_POINTS_2]"
      # Exemplo:
      #   name: "SRE/Platform Admin"
      #   needs: "Visibilidade de deploys em produção e rollback rápido em falhas"
      #   pain_points: "Downtime médio de 30min quando deploy falha devido a rollback manual"

      # Adicione mais personas conforme necessário

  jornadas_criticas:
    - journey: "[USER_JOURNEY_1]"
      priority: "[P1|P2|P3]"
      value: "[VALUE_PROPOSITION_1]"
      # Exemplo:
      #   journey: "Deploy de nova feature em produção"
      #   priority: "P1"
      #   value: "Reduz tempo de 2h para 15min e taxa de erro de 15% para <1%"

    - journey: "[USER_JOURNEY_2]"
      priority: "[P1|P2|P3]"
      value: "[VALUE_PROPOSITION_2]"
      # Exemplo:
      #   journey: "Rollback automático em caso de falha de deploy"
      #   priority: "P1"
      #   value: "Reduz downtime de 30min para 2min com rollback automático"

      # Adicione mais jornadas conforme necessário
      # P1 = Crítico (MVP), P2 = Importante, P3 = Desejável

decisoes_iniciais:
  - id: "D-01"
    question: "[DECISION_QUESTION_1]"
    decision: "[DECISION_MADE_1]"
    # Exemplo:
    #   id: "D-01"
    #   question: "Construir solução própria ou comprar SaaS?"
    #   decision: "Construir (justificativa: requisitos específicos de integração com sistema legado não atendidos por SaaS existentes)"

    # Adicione mais decisões conforme necessário
    # Se nenhuma decisão foi tomada ainda, remova esta seção ou deixe lista vazia: []

perguntas_abertas:
  - question: "[OPEN_QUESTION_1]"
    impact: "[Alto|Médio|Baixo]"
    # Exemplo:
    #   question: "Como lidar com multi-tenancy? Deployment isolado por tenant ou compartilhado?"
    #   impact: "Alto - afeta arquitetura de dados e segurança"

  - question: "[OPEN_QUESTION_2]"
    impact: "[Alto|Médio|Baixo]"
    # Exemplo:
    #   question: "Suporte a quais idiomas na UI? Apenas PT-BR ou PT-BR + EN?"
    #   impact: "Médio - afeta UI e mensagens de validação"

    # Adicione mais perguntas conforme necessário
    # Se todas perguntas foram resolvidas, deixe lista vazia: []

metadata:
  owner: "[PRODUCT_OWNER]"
  tech_lead: "[TECH_LEAD]"
  team: "[TEAM_NAME]"
  tags:
    - "[TAG1]"
    - "[TAG2]"
    # Exemplo: ["automation", "devops", "deployment", "ci-cd"]

  template_version: "1.0.0"
  last_updated: "[YYYY-MM-DD]"

# Quality Gates (para validação com speckit.validate --layer business):
# ✅ Todos placeholders [BRACKET] substituídos
# ✅ Pelo menos 1 métrica de sucesso definida
# ✅ Pelo menos 1 persona identificada
# ✅ Visão de alto nível clara (<= 3 frases)
# ✅ Jornadas críticas priorizadas (P1, P2, P3)
